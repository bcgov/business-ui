name: Test pnpm v11 upgrade - business-ui apps
on:
  push:
    branches: [feat/upgrade-pnpm-v11]
  pull_request:
    branches: [main]

jobs:
  test-pnpm-v11:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: web/corps
            lockfile: pnpm-lock.yaml
          - app: web/registry-home
            lockfile: pnpm-lock.yaml
          - app: web/person-roles
            lockfile: pnpm-lock.yaml
          - app: web/business-registry-dashboard
            lockfile: web/business-registry-dashboard/pnpm-lock.yaml
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: latest-11
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ${{ matrix.lockfile }}
      - name: Install
        run: pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Nuxt Prepare
        run: pnpm exec nuxt prepare || true
        continue-on-error: true
      - name: Build
        run: pnpm build
      - name: pnpm version
        run: pnpm --version
