name: Test pnpm v11 upgrade - business-ui apps
on:
  push:
    branches: [feat/upgrade-pnpm-v11]
  pull_request:
    branches: [main]

jobs:
  test-pnpm-v11:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [web/corps, web/registry-home, web/person-roles, web/business-registry-dashboard]
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: latest-11
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ${{ matrix.app }}/pnpm-lock.yaml
      - name: Install
        run: pnpm install
      - name: Build
        run: pnpm build
      - name: pnpm version
        run: pnpm --version
